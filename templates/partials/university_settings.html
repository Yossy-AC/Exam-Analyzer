<div class="university-settings">
    <h4 style="margin-bottom:12px;">大学設定
        <span style="font-size:12px; font-weight:normal; color:var(--muted); margin-left:8px;">
            分類・地域が未設定の大学を上部に表示しています
        </span>
    </h4>

    {% if not universities %}
    <p class="muted">登録大学なし</p>
    {% else %}
    <table class="table" style="font-size:13px;">
        <thead>
            <tr>
                <th style="width:150px;">大学名</th>
                <th style="width:140px;">大学分類</th>
                <th style="width:140px;">地域</th>
                <th style="width:160px;"></th>
            </tr>
        </thead>
        <tbody>
            {% for u in universities %}
            {% set is_unset = (u.university_class == '' or u.region == '') %}
            <tr id="univ-row-{{ loop.index }}" {% if is_unset %}class="bg-warning-subtle"{% endif %}>
                <td>
                    <input id="name-{{ loop.index }}" type="text" value="{{ u.name }}"
                           style="width:100%; font-size:12px; border:1px solid var(--border); padding:2px 4px; border-radius:3px;"
                           data-original="{{ u.name }}">
                    {% if is_unset %}
                    <span style="font-size:10px; color:var(--danger); margin-left:4px;">未設定</span>
                    {% endif %}
                </td>
                <td>
                    <select id="cls-{{ loop.index }}" style="width:100%; font-size:12px;">
                        <option value="">-- 選択 --</option>
                        {% for cls in university_class_list %}
                        {% if cls != '未設定' %}
                        <option value="{{ cls }}" {% if u.university_class == cls %}selected{% endif %}>{{ cls }}</option>
                        {% endif %}
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <select id="reg-{{ loop.index }}" style="width:100%; font-size:12px;">
                        <option value="">-- 選択 --</option>
                        {% for r in region_list %}
                        {% if r != '未設定' %}
                        <option value="{{ r }}" {% if u.region == r %}selected{% endif %}>{{ r }}</option>
                        {% endif %}
                        {% endfor %}
                    </select>
                </td>
                <td style="white-space:nowrap;">
                    <button class="btn btn-sm btn-primary"
                            onclick="saveUnivSettings({{ loop.index }})"
                            style="font-size:11px; padding:3px 8px;">
                        保存
                    </button>
                    <button class="btn btn-sm"
                            onclick="deleteUniv('{{ u.name }}', {{ loop.index }})"
                            style="font-size:11px; padding:3px 8px; background:var(--danger); color:#fff;">
                        削除
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</div>

<script>
const _univBase = document.querySelector('base')?.href || '/';

async function saveUnivSettings(idx) {
    const nameInput = document.getElementById('name-' + idx);
    const originalName = nameInput.dataset.original;
    const newName = nameInput.value.trim();
    const cls = document.getElementById('cls-' + idx).value;
    const reg = document.getElementById('reg-' + idx).value;

    if (!newName) { alert('大学名を入力してください'); return; }
    if (!cls && !reg) { alert('分類または地域のいずれかを選択してください'); return; }

    try {
        // 名前変更がある場合
        if (newName !== originalName) {
            const renameRes = await fetch(_univBase + 'api/universities/' + encodeURIComponent(originalName), {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_name: newName }),
            });
            if (!renameRes.ok) {
                const err = await renameRes.json();
                throw new Error(err.detail || 'HTTP ' + renameRes.status);
            }
            nameInput.dataset.original = newName;
        }
        // 分類・地域の保存
        const res = await fetch(_univBase + 'api/universities/' + encodeURIComponent(newName), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ university_class: cls, region: reg }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const row = document.getElementById('univ-row-' + idx);
        row.classList.remove('bg-warning-subtle');
        var badge = row.querySelector('span[style*="danger"]');
        if (badge) badge.remove();
    } catch (e) {
        alert('保存に失敗しました: ' + e.message);
    }
}

async function deleteUniv(name, idx) {
    if (!confirm(name + ' を削除しますか？\n関連する全データも削除されます。')) return;
    try {
        const res = await fetch(_univBase + 'api/universities/' + encodeURIComponent(name), {
            method: 'DELETE',
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('univ-row-' + idx).remove();
        if (data.deleted_passages > 0) {
            alert(name + ' を削除しました（関連データ ' + data.deleted_passages + '件も削除）');
        }
    } catch (e) {
        alert('削除に失敗しました: ' + e.message);
    }
}
</script>
