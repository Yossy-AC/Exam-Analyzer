{% extends "base.html" %}
{% block content %}
<div class="dashboard">
    <aside class="filters">
        <h3>フィルター</h3>
        <form id="filter-form">
            <label>年度
                <select name="year" id="filter-year">
                    <option value="">全て</option>
                    {% for y in years %}
                    <option value="{{ y }}">{{ y }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>大学
                <select name="university" id="filter-university">
                    <option value="">全て</option>
                    {% for u in universities %}
                    <option value="{{ u }}">{{ u }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>ジャンル
                <select name="genre_main" id="filter-genre">
                    <option value="">全て</option>
                    {% for g in genre_list %}
                    <option value="{{ g }}">{{ g }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>種別
                <select name="text_type" id="filter-type">
                    <option value="">全て</option>
                    {% for t in text_type_list %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </label>
            <button type="button" class="btn" onclick="applyFilters()">絞込</button>
        </form>
        <div class="stats">
            <p>全{{ total }}件 / レビュー済{{ reviewed }}件</p>
        </div>
    </aside>

    <section class="content">
        <div class="tabs">
            <button class="tab active" data-tab="upload">アップロード</button>
            <button class="tab" data-tab="uni-profile">大学別傾向</button>
            <button class="tab" data-tab="reading">長文統計</button>
            <button class="tab" data-tab="composition">英作文統計</button>
            <button class="tab" data-tab="yearly">経年変化</button>
            <button class="tab" data-tab="compare">大学間比較</button>
            <button class="tab" data-tab="records">一覧</button>
        </div>

        <!-- タブ1: アップロード -->
        <div class="tab-panel active" id="tab-upload">
            <form id="upload-form"
                  hx-post="/api/upload"
                  hx-target="#upload-results"
                  hx-encoding="multipart/form-data">
                <div id="dropzone"
                     ondragover="event.preventDefault(); this.classList.add('dragover')"
                     ondragleave="this.classList.remove('dragover')"
                     ondrop="handleDrop(event)">
                    <p>MDファイルをここにドラッグ&ドロップ</p>
                    <p>または</p>
                    <input type="file" name="files" multiple accept=".md" id="file-input">
                </div>
                <button type="submit" class="btn btn-primary">解析開始</button>
            </form>
            <div id="upload-results"></div>
            <div id="job-status"
                 hx-get="/api/jobs"
                 hx-trigger="load, every 5s"
                 hx-target="#job-status"></div>
        </div>

        <!-- タブ2: 大学別傾向 -->
        <div class="tab-panel" id="tab-uni-profile">
            <div class="tab-controls">
                <label>大学を選択:
                    <select id="profile-university" onchange="loadUniversityProfile()">
                        <option value="">-- 選択 --</option>
                        {% for u in universities %}
                        <option value="{{ u }}">{{ u }}</option>
                        {% endfor %}
                    </select>
                </label>
            </div>
            <div id="profile-content">
                <p class="muted">大学を選択してください</p>
            </div>
        </div>

        <!-- タブ3: 長文統計 -->
        <div class="tab-panel" id="tab-reading">
            <div class="chart-grid">
                <div class="chart-box">
                    <h4>長文ジャンル分布</h4>
                    <canvas id="reading-genre-chart" height="240"></canvas>
                </div>
                <div class="chart-box">
                    <h4>長文文体分布</h4>
                    <canvas id="reading-style-chart" height="240"></canvas>
                </div>
            </div>
            <div class="chart-grid" style="margin-top:16px">
                <div class="chart-box">
                    <h4>記述問題分類</h4>
                    <canvas id="reading-format-chart" height="200"></canvas>
                </div>
                <div class="chart-box">
                    <h4>ジャンル別サブジャンル詳細</h4>
                    <div id="reading-subgenres"></div>
                </div>
            </div>
        </div>

        <!-- タブ4: 英作文統計 -->
        <div class="tab-panel" id="tab-composition">
            <div class="chart-grid">
                <div class="chart-box">
                    <h4>英作文出題有無</h4>
                    <canvas id="comp-presence-chart" height="250"></canvas>
                </div>
                <div class="chart-box">
                    <h4>英作文の形式</h4>
                    <canvas id="comp-type-chart" height="250"></canvas>
                </div>
            </div>
            <div class="chart-grid" style="margin-top:16px">
                <div class="chart-box">
                    <h4>視覚情報の有無（英作文内）</h4>
                    <canvas id="comp-visual-chart" height="250"></canvas>
                </div>
                <div class="chart-box">
                    <h4>視覚情報の種別</h4>
                    <canvas id="comp-visual-type-chart" height="250"></canvas>
                </div>
            </div>
        </div>

        <!-- タブ5: 経年変化 -->
        <div class="tab-panel" id="tab-yearly">
            <div class="tab-controls">
                <label>大学を選択:
                    <select id="yearly-university" onchange="loadYearlyTrend()">
                        <option value="">-- 選択 --</option>
                        {% for u in universities %}
                        <option value="{{ u }}">{{ u }}</option>
                        {% endfor %}
                    </select>
                </label>
            </div>
            <div class="chart-grid">
                <div class="chart-box">
                    <h4>ジャンル推移</h4>
                    <canvas id="yearly-genre-chart" height="300"></canvas>
                </div>
                <div class="chart-box">
                    <h4>設問形式推移</h4>
                    <canvas id="yearly-format-chart" height="300"></canvas>
                </div>
            </div>
        </div>

        <!-- タブ6: 大学間比較 -->
        <div class="tab-panel" id="tab-compare">
            <div class="compare-section">
                <h4>大学 × ジャンル ヒートマップ</h4>
                <div id="heatmap-content"
                     hx-get="/api/stats/heatmap"
                     hx-trigger="revealed"></div>
            </div>
            <div class="compare-section" style="margin-top:24px">
                <h4>設問形式の大学別比較</h4>
                <canvas id="qformat-chart" height="400"></canvas>
            </div>
        </div>

        <!-- タブ7: 一覧 -->
        <div class="tab-panel" id="tab-records">
            <div class="bulk-actions">
                <h4>一括置換</h4>
                <form hx-post="/api/passages/bulk-replace" hx-target="#records-table">
                    <select name="field">
                        <option value="genre_main">ジャンル</option>
                        <option value="genre_sub">サブジャンル</option>
                        <option value="text_style">テキスト種別</option>
                    </select>
                    <input type="text" name="old_value" placeholder="変更前">
                    <input type="text" name="new_value" placeholder="変更後">
                    <button type="submit" class="btn btn-sm">一括置換</button>
                </form>
            </div>
            <div id="records-table"
                 hx-get="/api/passages"
                 hx-trigger="revealed"></div>
        </div>
    </section>
</div>

<script>
// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

        if (tab.dataset.tab === 'reading') loadReadingStats();
        if (tab.dataset.tab === 'composition') loadCompositionStats();
        if (tab.dataset.tab === 'compare') loadQuestionFormat();
    });
});

// ドラッグ&ドロップ
function handleDrop(e) {
    e.preventDefault();
    e.target.classList.remove('dragover');
    document.getElementById('file-input').files = e.dataTransfer.files;
}

// フィルター適用
function applyFilters() {
    const params = new URLSearchParams();
    const map = {year: 'filter-year', university: 'filter-university', genre_main: 'filter-genre', text_type: 'filter-type'};
    for (const [key, id] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (el && el.value) params.set(key, el.value);
    }
    const qs = params.toString();
    htmx.ajax('GET', '/api/passages?' + qs, '#records-table');
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) {
        if (activeTab.dataset.tab === 'reading') loadReadingStats();
        if (activeTab.dataset.tab === 'composition') loadCompositionStats();
        if (activeTab.dataset.tab === 'compare') {
            htmx.ajax('GET', '/api/stats/heatmap?' + qs, '#heatmap-content');
            loadQuestionFormat();
        }
    }
}

// Chart.js ユーティリティ
const charts = {};
function createChart(id, config) {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id).getContext('2d'), config);
}

const PALETTE = ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'];
function palette(n) { return Array.from({length: n}, (_, i) => PALETTE[i % PALETTE.length]); }

function doughnutConfig(labels, data, colors) {
    return {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors || palette(labels.length) }] },
        options: { responsive: true, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } } }
    };
}

// ---------- タブ2: 大学別傾向 ----------
function loadUniversityProfile() {
    const uni = document.getElementById('profile-university').value;
    const year = document.getElementById('filter-year').value;
    let url = '/api/stats/university-profile?university=' + encodeURIComponent(uni);
    if (year) url += '&year=' + year;
    htmx.ajax('GET', url, '#profile-content');
}

// ---------- タブ3: 長文統計 ----------
async function loadReadingStats() {
    const params = new URLSearchParams();
    const year = document.getElementById('filter-year').value;
    const uni = document.getElementById('filter-university').value;
    if (year) params.set('year', year);
    if (uni) params.set('university', uni);

    const res = await fetch('/api/stats/reading-stats?' + params.toString());
    const data = await res.json();

    createChart('reading-genre-chart', doughnutConfig(data.genre.labels, data.genre.data, data.genre.colors));
    createChart('reading-style-chart', doughnutConfig(data.style.labels, data.style.data));
    createChart('reading-format-chart', {
        type: 'bar',
        data: { labels: data.format.labels, datasets: [{ data: data.format.data, backgroundColor: ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f'] }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
    });

    // ジャンル別サブジャンル詳細表
    const subgenreEl = document.getElementById('reading-subgenres');
    if (data.subgenres && Object.keys(data.subgenres).length > 0) {
        let html = '<table class="table table-compact"><thead><tr><th>ジャンル</th><th>サブジャンル</th><th>件数</th></tr></thead><tbody>';
        for (const [genre, subs] of Object.entries(data.subgenres)) {
            for (let i = 0; i < subs.length; i++) {
                html += '<tr>' + (i === 0 ? '<td rowspan="' + subs.length + '"><strong>' + genre + '</strong></td>' : '') +
                    '<td>' + subs[i].subgenre + '</td>' +
                    '<td class="center">' + subs[i].count + '</td>' +
                    '</tr>';
            }
        }
        html += '</tbody></table>';
        subgenreEl.innerHTML = html;
    } else {
        subgenreEl.innerHTML = '<p class="muted">サブジャンルデータなし</p>';
    }
}

// ---------- タブ4: 英作文統計 ----------
async function loadCompositionStats() {
    const params = new URLSearchParams();
    const year = document.getElementById('filter-year').value;
    const uni = document.getElementById('filter-university').value;
    if (year) params.set('year', year);
    if (uni) params.set('university', uni);

    const res = await fetch('/api/stats/composition-stats?' + params.toString());
    const data = await res.json();

    createChart('comp-presence-chart', doughnutConfig(data.presence.labels, data.presence.data, ['#59a14f','#dee2e6']));
    createChart('comp-type-chart', doughnutConfig(data.type.labels, data.type.data, ['#76b7b2','#59a14f','#edc948']));
    createChart('comp-visual-chart', doughnutConfig(data.visual.labels, data.visual.data, ['#f28e2b','#dee2e6']));

    if (data.visual_type.labels.length) {
        createChart('comp-visual-type-chart', doughnutConfig(data.visual_type.labels, data.visual_type.data));
    }
}

// ---------- タブ5: 経年変化 ----------
async function loadYearlyTrend() {
    const uni = document.getElementById('yearly-university').value;
    if (!uni) return;

    const res = await fetch('/api/stats/yearly-trend?university=' + encodeURIComponent(uni));
    const data = await res.json();
    if (data.empty) return;

    createChart('yearly-genre-chart', {
        type: 'bar', data: data.genre,
        options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
            plugins: { title: { display: true, text: uni + ' ジャンル推移' } } }
    });

    createChart('yearly-format-chart', {
        type: 'line', data: data.format,
        options: { responsive: true, scales: { y: { beginAtZero: true } },
            plugins: { title: { display: true, text: uni + ' 設問形式推移' } } }
    });
}

// ---------- タブ6: 大学間比較 ----------
async function loadQuestionFormat() {
    const params = new URLSearchParams();
    const year = document.getElementById('filter-year').value;
    if (year) params.set('year', year);

    const res = await fetch('/api/stats/question-format?' + params.toString());
    const data = await res.json();

    createChart('qformat-chart', {
        type: 'bar', data: data,
        options: { indexAxis: 'y', responsive: true, scales: { x: { beginAtZero: true } },
            plugins: { title: { display: true, text: '設問形式の大学別比較' } } }
    });
}
</script>
{% endblock %}
