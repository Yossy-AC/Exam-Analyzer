{% extends "base.html" %}
{% block content %}
<div class="dashboard">
    <section class="content" style="max-width:100%;">
        <div class="tabs">
            <button class="tab active" data-tab="records">データ一覧</button>
            <button class="tab" data-tab="upload">アップロード</button>
            <button class="tab" data-tab="univ-settings">大学設定</button>
        </div>

        <!-- タブ1: データ一覧 -->
        <div class="tab-panel active" id="tab-records">
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px;">
                <details class="filter-panel" id="manage-filter-panel">
                    <summary>大学属性</summary>
                    <div class="filter-panel-body">
                        <div>
                            <div class="filter-section-label">大学分類</div>
                            <div class="filter-row">
                                {% for cls in university_class_list %}
                                <label style="font-size:11px; display:flex; align-items:center; gap:2px; white-space:nowrap;">
                                    <input type="checkbox" name="manage-cls" value="{{ cls }}" checked onchange="updateFilterPanel('manage-filter-panel'); applyRecordsFilter()"> {{ cls }}
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                        <div>
                            <div class="filter-section-label">地域</div>
                            <div class="filter-row">
                                {% for r in region_list %}
                                <label style="font-size:11px; display:flex; align-items:center; gap:2px; white-space:nowrap;">
                                    <input type="checkbox" name="manage-rgn" value="{{ r }}" checked onchange="updateFilterPanel('manage-filter-panel'); applyRecordsFilter()"> {{ r }}
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </details>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">大学名
                    <input type="text" id="filter-university-name" placeholder="部分一致"
                           style="width:110px;" oninput="applyRecordsFilter()">
                </label>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">種別
                    <select id="filter-text-type" onchange="applyRecordsFilter()">
                        <option value="">すべて</option>
                        <option value="long_reading">長文読解</option>
                        <option value="short_translation">短文和訳</option>
                        <option value="composition">英作文</option>
                        <option value="others">その他</option>
                        <option value="listening">リスニング</option>
                    </select>
                </label>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">ジャンル
                    <select id="filter-genre-main" onchange="applyRecordsFilter()">
                        <option value="">すべて</option>
                        {% for g in genre_list %}
                        <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">CEFR
                    <select id="filter-cefr-level" onchange="applyRecordsFilter()">
                        <option value="">すべて</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </label>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">テーマ
                    <input type="text" id="filter-theme" placeholder="部分一致"
                           style="width:110px;" oninput="applyRecordsFilter()">
                </label>
                <label style="display:flex; flex-direction:column; gap:2px; font-size:12px;">済フラグ
                    <select id="filter-reviewed" onchange="applyRecordsFilter()">
                        <option value="">すべて</option>
                        <option value="false">未確認</option>
                        <option value="true">確認済み</option>
                    </select>
                </label>
                <button type="button" class="btn btn-sm btn-primary" style="margin-left:auto; align-self:flex-end;"
                        onclick="openAddPassageModal()">＋ データ追加</button>
            </div>
            <div id="bulk-bar" style="display:none; margin-bottom:8px;">
                <button class="btn btn-sm btn-danger" onclick="bulkDelete()">選択した行を削除</button>
                <button class="btn btn-sm" onclick="bulkReview()">一括確認済み</button>
                <span id="bulk-count" style="font-size:12px; color:var(--muted); margin-left:8px;"></span>
            </div>
            <div id="records-table"
                 hx-get="api/passages"
                 hx-trigger="revealed"></div>
            <div id="pagination-bar" style="display:flex; gap:4px; align-items:center; margin-top:8px; flex-wrap:wrap;"></div>
        </div>

        <!-- データ追加モーダル -->
        <div id="add-passage-modal" class="modal-overlay">
            <div class="modal-card">
                <h3 style="margin:0 0 16px;">データ追加</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <label style="font-size:13px;">大学名 <span style="color:var(--danger);">*</span><br>
                        <input type="text" id="new-university" style="width:100%;" placeholder="例: 東京大"></label>
                    <label style="font-size:13px;">年度 <span style="color:var(--danger);">*</span><br>
                        <input type="number" id="new-year" style="width:100%;" placeholder="例: 2024" min="1990" max="2099"></label>
                    <label style="font-size:13px;">問番号 <span style="color:var(--danger);">*</span><br>
                        <input type="text" id="new-question-number" style="width:100%;" value="I" placeholder="例: I, II"></label>
                    <label style="font-size:13px;">パッセージ番号<br>
                        <input type="number" id="new-passage-index" style="width:100%;" value="1" min="1"></label>
                    <label style="font-size:13px;">種別 <span style="color:var(--danger);">*</span><br>
                        <select id="new-text-type" style="width:100%;">
                            <option value="long_reading">long_reading</option>
                            <option value="short_translation">short_translation</option>
                            <option value="composition">composition</option>
                            <option value="listening">listening</option>
                        </select></label>
                    <label style="font-size:13px;">学部<br>
                        <input type="text" id="new-faculty" style="width:100%;" placeholder="例: 理系, 文系"></label>
                    <label style="font-size:13px;">文体<br>
                        <select id="new-text-style" style="width:100%;">
                            <option value="">-- 選択 --</option>
                            <option>説明文</option>
                            <option>論説文</option>
                            <option>ニュース・レポート</option>
                            <option>エッセイ・評論</option>
                            <option>物語文</option>
                        </select></label>
                    <label style="font-size:13px;">語数<br>
                        <input type="number" id="new-word-count" style="width:100%;" placeholder="例: 600" min="0"></label>
                    <label style="font-size:13px;">ジャンル<br>
                        <select id="new-genre-main" style="width:100%;">
                            {% for g in genre_list %}
                            <option value="{{ g }}" {% if g == 'その他' %}selected{% endif %}>{{ g }}</option>
                            {% endfor %}
                        </select></label>
                    <label style="font-size:13px;">和文英訳<br>
                        <input type="checkbox" id="new-wabun-eiyaku"></label>
                    <label style="font-size:13px;">自由英作文<br>
                        <input type="checkbox" id="new-jiyu-eisakubun"></label>
                    <label style="font-size:13px; grid-column:1/-1;">サブジャンル<br>
                        <input type="text" id="new-genre-sub" style="width:100%;"></label>
                    <label style="font-size:13px; grid-column:1/-1;">テーマ<br>
                        <input type="text" id="new-theme" style="width:100%;"></label>
                </div>
                <div id="add-passage-error" style="color:var(--danger); font-size:13px; margin-top:8px;"></div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
                    <button class="btn btn-sm" onclick="closeAddPassageModal()">キャンセル</button>
                    <button class="btn btn-sm btn-primary" onclick="submitAddPassage()">追加</button>
                </div>
            </div>
        </div>

        <!-- タブ2: アップロード -->
        <div class="tab-panel" id="tab-upload">
            <form id="upload-form" onsubmit="return submitUpload(event)">
                <div id="dropzone" class="dropzone"
                     ondragover="event.preventDefault(); this.classList.add('dragover')"
                     ondragleave="this.classList.remove('dragover')"
                     ondrop="handleDropAll(event)">
                    <p>MD / PDF ファイルをここにドラッグ&ドロップ</p>
                    <p style="font-size:12px; color:var(--muted);">フォルダごとの投入も可能</p>
                    <p>または</p>
                    <input type="file" name="files" multiple accept=".md,.pdf" id="file-input">
                </div>
                <div id="upload-progress" style="display:none; margin:8px 0;">
                    <progress id="upload-progress-bar" max="100" value="0" style="width:100%; height:20px;"></progress>
                    <span id="upload-progress-text" style="font-size:13px; color:var(--muted);"></span>
                </div>
                <button type="submit" id="upload-submit-btn" class="btn btn-primary">解析開始</button>
            </form>

            <div id="upload-results"></div>

            <!-- 処理状況 -->
            <div style="margin-top:24px; border-top:1px solid var(--border); padding-top:16px;">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                    <h4 style="margin:0;">処理状況</h4>
                    <span id="job-count-label" style="font-size:13px; color:var(--muted);"></span>
                </div>
                <div style="margin-bottom:8px;">
                    <input type="text" id="job-filter-input" placeholder="ファイル名で絞り込み..." style="font-size:13px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; width:250px;">
                    <select id="job-status-filter" style="font-size:13px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; margin-left:8px;">
                        <option value="">全状態</option>
                        <option value="completed">完了</option>
                        <option value="processing">処理中</option>
                        <option value="pending">待機中</option>
                        <option value="error">エラー</option>
                    </select>
                </div>
                <div id="job-status"
                     hx-get="api/jobs"
                     hx-trigger="load, every 5s"
                     hx-target="#job-status"></div>
            </div>

            <!-- 要確認リスト -->
            <div style="margin-top:24px; border-top:1px solid var(--border); padding-top:16px;">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                    <h4 style="margin:0;">要確認リスト</h4>
                    <button class="btn btn-sm" onclick="loadReviewList()">更新</button>
                    <button class="btn btn-sm" id="reclassify-btn" onclick="runReclassify()">その他○○ を再分類</button>
                </div>
                <div id="review-list">
                    <p style="color:var(--muted); font-size:13px;">「更新」ボタンを押して確認してください</p>
                </div>
            </div>
        </div>

        <!-- タブ3: 大学設定 -->
        <div class="tab-panel" id="tab-univ-settings">
            <p class="muted">読み込み中...</p>
        </div>
    </section>
</div>

<script>
const BASE = document.querySelector('base')?.href || '/';

// タブ切り替え
function jumpToRecord(universityName) {
    switchTab('records');
    const el = document.getElementById('filter-university-name');
    if (el) { el.value = universityName; }
    applyRecordsFilter();
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const btn = document.querySelector(`.tab[data-tab="${name}"]`);
    if (btn) btn.classList.add('active');
    const panel = document.getElementById('tab-' + name);
    if (panel) panel.classList.add('active');
    location.hash = name;

    if (name === 'univ-settings') loadPartial(BASE + 'partials/university-settings', 'tab-univ-settings');
    if (name === 'upload') loadReviewList();
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// リロード時にハッシュ・フィルタを復元
if (location.hash) {
    const tab = location.hash.slice(1);
    if (document.querySelector(`.tab[data-tab="${tab}"]`)) {
        switchTab(tab);
    }
}
(function restoreFilters() {
    var sp = new URLSearchParams(window.location.search);
    var map = {
        'university_name': 'filter-university-name',
        'text_type': 'filter-text-type',
        'genre_main': 'filter-genre-main',
        'cefr_level': 'filter-cefr-level',
        'theme': 'filter-theme',
        'reviewed': 'filter-reviewed'
    };
    var hasFilter = false;
    for (var key in map) {
        var val = sp.get(key);
        if (val) {
            var el = document.getElementById(map[key]);
            if (el) { el.value = val; hasFilter = true; }
        }
    }
    if (hasFilter) applyRecordsFilter();
})();

// アップロード送信（fetch API + プログレス表示）
function submitUpload(e) {
    e.preventDefault();
    const input = document.getElementById('file-input');
    if (!input.files || input.files.length === 0) {
        document.getElementById('upload-results').innerHTML = '<p style="color:var(--danger);">ファイルが選択されていません</p>';
        return false;
    }
    const formData = new FormData();
    for (const file of input.files) {
        formData.append('files', file);
    }
    const btn = document.getElementById('upload-submit-btn');
    const progressDiv = document.getElementById('upload-progress');
    const progressBar = document.getElementById('upload-progress-bar');
    const progressText = document.getElementById('upload-progress-text');
    btn.disabled = true;
    btn.textContent = 'アップロード中...';
    progressDiv.style.display = 'block';
    progressBar.value = 0;
    progressText.textContent = `${input.files.length}ファイル送信中...`;

    const xhr = new XMLHttpRequest();
    xhr.upload.addEventListener('progress', (ev) => {
        if (ev.lengthComputable) {
            const pct = Math.round(ev.loaded / ev.total * 100);
            progressBar.value = pct;
            progressText.textContent = `送信中... ${pct}% (${(ev.loaded/1024/1024).toFixed(1)}MB / ${(ev.total/1024/1024).toFixed(1)}MB)`;
        }
    });
    xhr.addEventListener('load', () => {
        btn.disabled = false;
        btn.textContent = '解析開始';
        progressDiv.style.display = 'none';
        document.getElementById('upload-results').innerHTML = xhr.responseText;
    });
    xhr.addEventListener('error', (ev) => {
        btn.disabled = false;
        btn.textContent = '解析開始';
        progressDiv.style.display = 'none';
        document.getElementById('upload-results').innerHTML =
            `<p style="color:var(--danger);">ネットワークエラー: status=${xhr.status}, readyState=${xhr.readyState}</p>`;
    });
    xhr.addEventListener('timeout', () => {
        btn.disabled = false;
        btn.textContent = '解析開始';
        progressDiv.style.display = 'none';
        document.getElementById('upload-results').innerHTML = '<p style="color:var(--danger);">タイムアウトしました。</p>';
    });
    xhr.addEventListener('loadend', () => {
        if (xhr.status >= 400) {
            btn.disabled = false;
            btn.textContent = '解析開始';
            progressDiv.style.display = 'none';
            document.getElementById('upload-results').innerHTML =
                `<p style="color:var(--danger);">サーバーエラー: ${xhr.status} ${xhr.statusText}</p><pre style="font-size:12px;">${xhr.responseText?.substring(0, 500)}</pre>`;
        }
    });
    xhr.timeout = 300000; // 5分
    const url = BASE + 'api/upload-all';
    xhr.open('POST', url);
    xhr.send(formData);
    return false;
}

// ドラッグ&ドロップ（フォルダ対応）
async function handleDropAll(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const items = e.dataTransfer.items;
    const files = [];
    const promises = [];
    for (const item of items) {
        const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
        if (entry) {
            promises.push(collectFiles(entry, files));
        }
    }
    await Promise.all(promises);
    // .md と .pdf のみフィルタ
    const filtered = files.filter(f => f.name.endsWith('.md') || f.name.toLowerCase().endsWith('.pdf'));
    if (filtered.length === 0) return;
    const dt = new DataTransfer();
    filtered.forEach(f => dt.items.add(f));
    document.getElementById('file-input').files = dt.files;
}

function collectFiles(entry, files) {
    return new Promise(resolve => {
        if (entry.isFile) {
            entry.file(f => { files.push(f); resolve(); });
        } else if (entry.isDirectory) {
            const reader = entry.createReader();
            reader.readEntries(async entries => {
                await Promise.all(entries.map(e => collectFiles(e, files)));
                resolve();
            });
        } else {
            resolve();
        }
    });
}

// ---------- HTML partial ローダー ----------
async function loadPartial(url, targetId) {
    const target = document.getElementById(targetId);
    if (!target) return;
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const html = await res.text();
        target.innerHTML = html;
        target.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            newScript.textContent = oldScript.textContent;
            document.head.appendChild(newScript);
            document.head.removeChild(newScript);
        });
    } catch (e) {
        target.innerHTML = '<p class="muted">読み込みエラー: ' + e.message + '</p>';
    }
}

// ---------- データ一覧フィルター ----------
function applyRecordsFilter() {
    const params = new URLSearchParams();
    const uniName = document.getElementById('filter-university-name')?.value;
    if (uniName) params.append('university_name', uniName);
    const textType = document.getElementById('filter-text-type')?.value;
    if (textType) params.append('text_type', textType);
    const genreMain = document.getElementById('filter-genre-main')?.value;
    if (genreMain) params.append('genre_main', genreMain);
    const cefrLevel = document.getElementById('filter-cefr-level')?.value;
    if (cefrLevel) params.append('cefr_level', cefrLevel);
    const theme = document.getElementById('filter-theme')?.value;
    if (theme) params.append('theme', theme);
    const reviewed = document.getElementById('filter-reviewed')?.value;
    if (reviewed) params.append('reviewed', reviewed);
    document.querySelectorAll('[name=manage-cls]:checked').forEach(cb => params.append('university_class', cb.value));
    document.querySelectorAll('[name=manage-rgn]:checked').forEach(cb => params.append('region', cb.value));
    loadPartial(BASE + 'api/passages?' + params.toString(), 'records-table');
    // URLにフィルタ状態を保存
    var url = new URL(window.location);
    url.searchParams.delete('university_name'); url.searchParams.delete('text_type');
    url.searchParams.delete('genre_main'); url.searchParams.delete('cefr_level');
    url.searchParams.delete('theme'); url.searchParams.delete('reviewed');
    if (uniName) url.searchParams.set('university_name', uniName);
    if (textType) url.searchParams.set('text_type', textType);
    if (genreMain) url.searchParams.set('genre_main', genreMain);
    if (cefrLevel) url.searchParams.set('cefr_level', cefrLevel);
    if (theme) url.searchParams.set('theme', theme);
    if (reviewed) url.searchParams.set('reviewed', reviewed);
    history.replaceState(null, '', url);
}

// ---------- データ追加モーダル ----------
function openAddPassageModal() {
    document.getElementById('add-passage-error').textContent = '';
    var modal = document.getElementById('add-passage-modal');
    modal.style.display = 'block';
    var first = modal.querySelector('input, select');
    if (first) first.focus();
}

function closeAddPassageModal() {
    document.getElementById('add-passage-modal').style.display = 'none';
}

// モーダル: Escapeで閉じる + オーバーレイクリックで閉じる
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var modal = document.getElementById('add-passage-modal');
        if (modal && modal.style.display === 'block') closeAddPassageModal();
    }
});
document.getElementById('add-passage-modal')?.addEventListener('click', function(e) {
    if (e.target === this) closeAddPassageModal();
});

async function submitAddPassage() {
    const university = document.getElementById('new-university').value.trim();
    const year = document.getElementById('new-year').value.trim();
    const questionNumber = document.getElementById('new-question-number').value.trim();

    if (!university || !year || !questionNumber) {
        document.getElementById('add-passage-error').textContent = '大学名・年度・問番号は必須です';
        return;
    }

    const body = {
        university,
        year: parseInt(year),
        question_number: questionNumber,
        passage_index: parseInt(document.getElementById('new-passage-index').value) || 1,
        text_type: document.getElementById('new-text-type').value,
        faculty: document.getElementById('new-faculty').value.trim(),
        text_style: document.getElementById('new-text-style').value,
        word_count: document.getElementById('new-word-count').value || null,
        genre_main: document.getElementById('new-genre-main').value,
        genre_sub: document.getElementById('new-genre-sub').value.trim(),
        theme: document.getElementById('new-theme').value.trim(),
        has_wabun_eiyaku: document.getElementById('new-wabun-eiyaku').checked,
        has_jiyu_eisakubun: document.getElementById('new-jiyu-eisakubun').checked,
    };

    try {
        const res = await fetch(BASE + 'api/passages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
            closeAddPassageModal();
            applyRecordsFilter();
        } else {
            document.getElementById('add-passage-error').textContent = data.error || '追加に失敗しました';
        }
    } catch (e) {
        document.getElementById('add-passage-error').textContent = 'エラー: ' + e.message;
    }
}

// ---------- サブジャンル自動再分類 ----------
async function runReclassify() {
    if (!confirm('genre_sub が「その他○○」のデータをClaude APIで再分類します。\nAPI料金が発生します。続けますか？')) return;
    const btn = document.getElementById('reclassify-btn');
    btn.disabled = true;
    btn.textContent = '再分類中...';
    try {
        const res = await fetch(BASE + 'api/passages/reclassify-sub', { method: 'POST' });
        const data = await res.json();
        showToast(`完了: ${data.updated}件を更新しました`, 'success');
        loadPartial(BASE + 'api/review-list', 'review-list');
    } catch (e) {
        showToast('エラー: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'その他○○ を再分類';
    }
}

// ---------- ページネーション ----------
const PAGE_SIZE = 50;
let currentPage = 1;

function applyPagination() {
    const table = document.getElementById('passages-table');
    if (!table) return;
    const rows = table.querySelectorAll('tbody tr');
    const totalRows = rows.length;
    const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    rows.forEach((row, i) => {
        row.style.display = (i >= (currentPage - 1) * PAGE_SIZE && i < currentPage * PAGE_SIZE) ? '' : 'none';
    });
    renderPaginationBar(totalPages, totalRows);
}

function renderPaginationBar(totalPages, totalRows) {
    const bar = document.getElementById('pagination-bar');
    if (!bar) return;
    if (totalRows <= PAGE_SIZE) { bar.innerHTML = ''; return; }

    let html = `<span style="font-size:12px;color:var(--muted);">${totalRows}件中 ${(currentPage-1)*PAGE_SIZE+1}〜${Math.min(currentPage*PAGE_SIZE, totalRows)}件</span>`;
    html += `<button class="btn btn-xs" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>&lt;</button>`;
    for (let p = 1; p <= totalPages; p++) {
        if (totalPages > 10 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== totalPages) {
            if (p === currentPage - 3 || p === currentPage + 3) html += '<span style="font-size:12px;">…</span>';
            continue;
        }
        html += `<button class="btn btn-xs${p === currentPage ? ' btn-primary' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    html += `<button class="btn btn-xs" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>&gt;</button>`;
    bar.innerHTML = html;
}

function goPage(p) {
    const table = document.getElementById('passages-table');
    if (!table) return;
    const totalRows = table.querySelectorAll('tbody tr').length;
    const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    applyPagination();
}

// records-table がHTMXやloadPartialで更新されたらページネーション適用
const _recordsObserver = new MutationObserver(() => {
    currentPage = 1;
    applyPagination();
    updateBulkBar();
});
_recordsObserver.observe(document.getElementById('records-table'), { childList: true, subtree: false });

// ---------- 一括選択・削除 ----------
function toggleSelectAll(master) {
    const table = document.getElementById('passages-table');
    if (!table) return;
    // 現在表示中のページの行のみ対象
    table.querySelectorAll('tbody tr').forEach(row => {
        if (row.style.display !== 'none') {
            const cb = row.querySelector('.row-select');
            if (cb) cb.checked = master.checked;
        }
    });
    updateBulkBar();
}

function updateBulkBar() {
    const checked = document.querySelectorAll('.row-select:checked');
    const bar = document.getElementById('bulk-bar');
    const count = document.getElementById('bulk-count');
    if (checked.length > 0) {
        bar.style.display = 'flex';
        count.textContent = `${checked.length}件選択中`;
    } else {
        bar.style.display = 'none';
    }
}

// チェックボックス変更の委任イベント
document.getElementById('records-table').addEventListener('change', (e) => {
    if (e.target.classList.contains('row-select')) updateBulkBar();
});

async function bulkDelete() {
    const checked = document.querySelectorAll('.row-select:checked');
    if (checked.length === 0) return;
    if (!confirm(`${checked.length}件のデータを削除しますか？`)) return;

    let deleted = 0;
    for (const cb of checked) {
        try {
            const res = await fetch(BASE + 'api/passages/' + encodeURIComponent(cb.value), { method: 'DELETE' });
            if (res.ok) {
                const row = cb.closest('tr');
                if (row) row.remove();
                deleted++;
            }
        } catch (e) { /* skip */ }
    }
    showToast(`${deleted}件を削除しました`, 'success');
    applyPagination();
    updateBulkBar();
}

async function bulkReview() {
    const checked = document.querySelectorAll('.row-select:checked');
    if (checked.length === 0) return;
    const ids = Array.from(checked).map(cb => cb.value);
    try {
        const res = await fetch(BASE + 'api/passages/bulk-review', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ids: ids})
        });
        if (!res.ok) throw new Error('更新失敗');
        const data = await res.json();
        showToast(`${data.updated}件を確認済みにしました`, 'success');
        applyRecordsFilter();
    } catch (e) {
        showToast(e.message, 'error');
    }
}

// ---------- フィルターパネル ----------
function updateFilterPanel(panelId) {
    var panel = document.getElementById(panelId);
    if (!panel) return;
    var all = panel.querySelectorAll('input[type=checkbox]');
    var checked = panel.querySelectorAll('input[type=checkbox]:checked');
    panel.classList.toggle('is-filtered', checked.length < all.length);
}

document.addEventListener('click', function(e) {
    document.querySelectorAll('details.filter-panel[open]').forEach(function(panel) {
        if (!panel.contains(e.target)) panel.removeAttribute('open');
    });
});

// ---------- ジョブテーブル: ソート・フィルタ・日付変換 ----------
var _jobSortState = {};

function initJobTable() {
    var table = document.getElementById('job-table');
    if (!table) return;

    // 件数ラベル更新
    var countLabel = document.getElementById('job-count-label');
    var totalRows = table.querySelectorAll('tbody tr').length;
    if (countLabel) countLabel.textContent = '（' + totalRows + '件）';

    // 日付を短縮フォーマット（既にJST）
    table.querySelectorAll('tbody tr').forEach(function(row) {
        var td = row.cells[4];
        if (!td) return;
        var raw = td.textContent.trim();
        if (!raw) return;
        var m = raw.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
        if (m) td.textContent = m[2] + '/' + m[3] + ' ' + m[4] + ':' + m[5];
    });

    // ソートイベント（ヘッダーにバインド）
    initSortable(table, _jobSortState, function() { applyJobFilter(); });

    // 現在のフィルタを適用
    applyJobFilter();
}

function applyJobFilter() {
    var table = document.getElementById('job-table');
    if (!table) return;
    var filterInput = document.getElementById('job-filter-input');
    var statusFilter = document.getElementById('job-status-filter');
    var keyword = (filterInput ? filterInput.value : '').toLowerCase();
    var statusVal = statusFilter ? statusFilter.value : '';

    table.querySelectorAll('tbody tr').forEach(function(row) {
        var filename = row.cells[0].textContent.toLowerCase();
        var status = row.dataset.status || '';
        var matchKeyword = !keyword || filename.includes(keyword);
        var matchStatus = !statusVal || status === statusVal;
        row.style.display = (matchKeyword && matchStatus) ? '' : 'none';
    });
}

// フィルタイベント（フィルタ入力はHTMXターゲット外なので一度だけバインド）
document.getElementById('job-filter-input').oninput = applyJobFilter;
document.getElementById('job-status-filter').onchange = applyJobFilter;

// HTMX swap後にジョブテーブルを初期化
document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target && e.detail.target.id === 'job-status') {
        initJobTable();
    }
});

// ---------- 汎用テーブルソート ----------
function initSortable(table, sortState, afterSort) {
    table.querySelectorAll('th.sortable').forEach(function(th) {
        th.style.cursor = 'pointer';
        th.onclick = function() {
            var col = parseInt(th.dataset.col);
            var asc = sortState[col] === 'asc' ? 'desc' : 'asc';
            // reset
            for (var k in sortState) delete sortState[k];
            sortState[col] = asc;
            table.querySelectorAll('th.sortable').forEach(function(h) { h.classList.remove('sort-asc', 'sort-desc'); });
            th.classList.add('sort-' + asc);
            var tbody = table.querySelector('tbody');
            var rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort(function(a, b) {
                var va = (a.cells[col] || {textContent:''}).textContent.trim();
                var vb = (b.cells[col] || {textContent:''}).textContent.trim();
                var na = parseFloat(va), nb = parseFloat(vb);
                if (!isNaN(na) && !isNaN(nb)) return asc === 'asc' ? na - nb : nb - na;
                return asc === 'asc' ? va.localeCompare(vb, 'ja') : vb.localeCompare(va, 'ja');
            });
            rows.forEach(function(r) { tbody.appendChild(r); });
            if (afterSort) afterSort();
        };
    });
}

// ---------- 要確認リスト ----------
var _reviewJobSortState = {};
var _reviewDataSortState = {};

function loadReviewList() {
    loadPartial(BASE + 'api/review-list', 'review-list');
}

function initReviewTables() {
    // ジョブ問題テーブル
    var jobTable = document.getElementById('review-job-table');
    if (jobTable) {
        initSortable(jobTable, _reviewJobSortState);
        initTableFilter('review-job-filter', jobTable, [0, 1]);
    }
    // データ問題テーブル
    var dataTable = document.getElementById('review-data-table');
    if (dataTable) {
        initSortable(dataTable, _reviewDataSortState);
        initTableFilter('review-data-filter', dataTable, [0, 1, 3, 4]);
    }
}

function initTableFilter(inputId, table, searchCols) {
    var input = document.getElementById(inputId);
    if (!input || !table) return;
    input.oninput = function() {
        var keyword = input.value.toLowerCase();
        table.querySelectorAll('tbody tr').forEach(function(row) {
            if (!keyword) { row.style.display = ''; return; }
            var match = false;
            searchCols.forEach(function(col) {
                var cell = row.cells[col];
                if (cell && cell.textContent.toLowerCase().includes(keyword)) match = true;
            });
            row.style.display = match ? '' : 'none';
        });
    };
}
</script>
