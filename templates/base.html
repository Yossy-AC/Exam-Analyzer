<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国公立大出題分析システム</title>
    <base href="{{ base_href | default('/') }}">
    <script nonce="{{ request.state.csp_nonce }}">
    (function(){var t=localStorage.getItem("portal-theme");if(!t)t=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t)})();
    </script>
    <script nonce="{{ request.state.csp_nonce }}" src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4"></script>
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script nonce="{{ request.state.csp_nonce }}">Chart.register(ChartDataLabels);</script>
    <link rel="stylesheet" href="/portal-assets/portal.css">
    <link rel="stylesheet" href="static/style.css?v=20260320c">
</head>
<body>
    <nav class="portal-nav">
        <div class="portal-nav-inner">
            <div class="portal-nav-left">
                <a href="/" class="portal-nav-brand"><img src="/portal-assets/logo-penguin.svg" alt="Yossy Portal" class="portal-nav-icon"></a>
                <button class="portal-theme-toggle" aria-label="テーマ切替">&#9790;</button>
            </div>
            <ul class="portal-nav-links">
                <li><a href="/">ホーム</a></li>
                {% if not is_student %}
                <li><a href="./">分析</a></li>
                <li><a href="manage">管理</a></li>
                <li><a href="translate">英訳</a></li>
                {% endif %}
            </ul>
            <div class="portal-nav-right">
                <a href="/auth/logout" class="portal-nav-logout">ログアウト</a>
            </div>
            <button class="portal-hamburger" aria-label="メニュー" aria-expanded="false">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg>
            </button>
        </div>
    </nav>

    <div class="portal-mobile-menu">
        <a href="/">ホーム</a>
        {% if not is_student %}
        <a href="./">分析</a>
        <a href="manage">管理</a>
        <a href="translate">英訳</a>
        {% endif %}
        <a href="/auth/logout" class="portal-nav-logout">ログアウト</a>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script nonce="{{ request.state.csp_nonce }}" src="/portal-assets/portal-nav.js"></script>
</body>
</html>
