<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国公立大出題分析システム</title>
    <base href="{{ base_href | default('/') }}">
    <script>
    (function(){var t=localStorage.getItem("portal-theme");if(!t)t=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t)})();
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script>Chart.register(ChartDataLabels);</script>
    <link rel="stylesheet" href="/portal-assets/portal.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <nav class="portal-nav">
        <div class="portal-nav-inner">
            <div class="portal-nav-left">
                <a href="/" class="portal-nav-brand"><img src="/portal-assets/logo-penguin.svg" alt="Yossy Portal" class="portal-nav-icon"></a>
                <button class="portal-theme-toggle" aria-label="テーマ切替">&#9790;</button>
            </div>
            <ul class="portal-nav-links">
                {% if not is_student %}
                <li><a href="./">分析</a></li>
                <li><a href="manage">管理</a></li>
                <li><a href="api/export/csv" class="ea-export-link">CSV出力</a></li>
                <li><a href="api/export/json" class="ea-export-link">JSON出力</a></li>
                <li><a href="api/export/db" class="ea-export-link">DB保存</a></li>
                {% endif %}
            </ul>
            <div class="portal-nav-right">
                <a href="/auth/logout" class="portal-nav-logout">ログアウト</a>
            </div>
            <button class="portal-hamburger" aria-label="メニュー" aria-expanded="false">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg>
            </button>
        </div>
    </nav>

    <div class="portal-mobile-menu">
        {% if not is_student %}
        <a href="./">分析</a>
        <a href="manage">管理</a>
        <a href="api/export/csv">CSV出力</a>
        <a href="api/export/json">JSON出力</a>
        <a href="api/export/db">DB保存</a>
        {% endif %}
        <a href="/auth/logout" class="portal-nav-logout">ログアウト</a>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container" style="position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>
    <script>
    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        toast.style.cssText = 'padding:10px 16px; border-radius:6px; font-size:13px; color:#fff; max-width:320px; box-shadow:0 2px 8px rgba(0,0,0,0.2); opacity:0; transition:opacity 0.3s;';
        toast.style.background = type === 'error' ? 'var(--danger, #e15759)' : type === 'success' ? 'var(--success, #34c759)' : 'var(--primary, #4e79a7)';
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(function() { toast.style.opacity = '1'; });
        setTimeout(function() {
            toast.style.opacity = '0';
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }
    </script>
    <script src="/portal-assets/portal-nav.js"></script>
</body>
</html>
